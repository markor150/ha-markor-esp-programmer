<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MarKor ESP Programmer</title>

<style>
body{
    margin:0;
    background:#111827;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
}
header{
    background:#1f2937;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}
main{
    max-width:1100px;
    margin:auto;
    padding:30px;
}
.card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}
button{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    padding:12px 20px;
    cursor:pointer;
    font-size:16px;
}
pre{
    background:black;
    color:#00ff66;
    padding:15px;
    border-radius:8px;
    overflow:auto;
}
</style>
</head>

<body>

<header>
MarKor ESP Programmer
</header>

<main>

<div class="card">
<h2>Status API</h2>

<button onclick="checkHealth()">
Sprawdź
</button>

<pre id="result">...</pre>

</div>

</main>

<script>
async function checkHealth(){

    const r=await fetch("/health");
    const j=await r.json();

    document.getElementById("result").textContent=
        JSON.stringify(j,null,2);
}

checkHealth();
</script>

</body>
</html>
